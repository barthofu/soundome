name: Docker

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to build"
        required: true
        type: string
      release_tag:
        description: "Release tag to publish with semver tags"
        required: false
        type: string

  # Manual test build: any branch, no latest tag
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to build"
        required: true
        default: main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.inputs.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Resolve release tag
        id: release-tag
        if: inputs.release_tag != ''
        shell: bash
        run: |
          TAG="${{ inputs.release_tag }}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag '$TAG' is not a non-CLI semver tag."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Derive release Docker tags
        id: meta-release
        if: inputs.release_tag != ''
        shell: bash
        run: |
          TAG="${{ steps.release-tag.outputs.tag }}"
          VERSION="${TAG#v}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)

          {
            echo 'tags<<EOF'
            echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:'"$VERSION"
            echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:'"$MAJOR_MINOR"
            echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Manual dispatch: branch-sha only, no latest ---
      - name: Derive test tags (manual)
        id: meta-manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          REF="${{ github.event.inputs.ref }}"
          SHA=$(git rev-parse --short HEAD)
          # Sanitize ref for use as a Docker tag (replace / and other forbidden chars)
          SAFE_REF=$(echo "$REF" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SAFE_REF}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ inputs.release_tag != '' && steps.meta-release.outputs.tags || steps.meta-manual.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
