name: CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:

  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Check formatting
        run: cargo fmt --all -- --check

      # - name: Clippy
      #   run: cargo clippy --workspace --exclude openrouter_api --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --release

      - name: Tests
        run: cargo test -q --workspace --exclude openrouter_api

  web:
    name: Web (svelte-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm web:check

  docker-release:
    name: Docker release
    needs:
      - rust
      - web
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-cli')
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker.yaml
    with:
      ref: ${{ github.ref_name }}
      release_tag: ${{ github.ref_name }}
    secrets: inherit
