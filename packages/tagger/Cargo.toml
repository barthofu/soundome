[package]
name = "tagger"
version = "0.1.0"
edition = "2021"

[dependencies]
shared = { path = "../shared" }
config = { path = "../config" }

tracing = { workspace = true }

audiotags = "0.5.0"
id3 = "1.16.2"
metaflac = "0.2.8"
mp4ameta = "0.11.0"
chrono = "0.4.39"
musicbrainz_rs = "0.9.0"
bandcamp = "0.3.4"
rspotify = { version = "0.16.0", default-features = false, features = [
  "env-file",
  "client-ureq",
  "ureq-rustls-tls",
] }
