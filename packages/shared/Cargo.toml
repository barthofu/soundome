[package]
name = "shared"
version = "0.1.0"
edition = "2021"

[dependencies]
config = { path = "../config" }

tracing = { workspace = true }
tracing-subscriber = { workspace = true }

chrono = { version = "0.4.39", features = ["serde"] }
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.138"
strsim = "0.11.1"
unicode-normalization = "0.1.23"
async-trait = "0.1.86"
strum = { version = "0.27.1", features = ["derive"] }
thiserror = "2.0.11"
tinytemplate = "1.1"
slug = "0.1.6"
schemars = "0.8.22"
rocket_okapi = { version = "0.9.0", features = ["swagger"] }
reqwest = { version = "0.12.5", default-features = false, features = ["json", "socks", "rustls-tls"] }
symphonia = "0.5.4"

[features]
default = []
diesel_integration = ["diesel"]

[dependencies.diesel]
version = "2.2.7"
optional = true