[package]
name = "orchestrator"
version = "0.1.0"
edition = "2021"

[dependencies]
shared = { path = "../shared" }
config = { path = "../config" }
downloader = { path = "../downloader" }
fetcher = { path = "../fetcher" }
tagger = { path = "../tagger" }
database = { path = "../database" }

tokio = { version = "1.43.0", features = ["time", "process", "io-util"] }
diesel = { version = "2.2.7", features = ["sqlite", "r2d2"] }
