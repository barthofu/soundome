[package]
name = "domain"
version = "0.1.0"
edition = "2021"

[dependencies]
shared = { path = "../shared", features = ["diesel_integration"] }
config = { path = "../config" }
downloader = { path = "../downloader" }
fetcher = { path = "../fetcher" }
tagger = { path = "../tagger" }
organizer = { path = "../organizer" }

tracing = { workspace = true }

chrono = { version = "0.4.39" }
tokio = { version = "1.44.2", features = ["time", "process", "io-util"] }
diesel = { version = "2.2.7", features = ["sqlite", "r2d2"] }
serde_json = "1.0"
uuid = { version = "1", features = ["v4"] }
walkdir = "2"
serde = { version = "1.0", features = ["derive"] }
schemars = "0.8"
cron = "0.12"
