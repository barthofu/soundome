[general]
base_library_dir = "./library"
temp_download_dir = "./temp"

[tagger]
# Metadata providers to use, in priority order.
# Supported values: "musicbrainz", "bandcamp"
metadata_providers = ["musicbrainz", "bandcamp", "spotify"]

[logs]
level = "info" # Options: "error", "warn", "info", "debug", "trace"
enable_reqwest_logging = false

[proxy]
enabled = true
urls = [
    "socks5://localhost:1080"
]

# Proxy configuration (optional)
# [proxy]
# enabled = true
# urls = [
#     "http://proxy1.example.com:8080",                    # Standard format without auth
#     "http://user:pass@proxy2.example.com:8080",         # Standard format with auth
#     "64.137.96.74:6641:eipncmhd:qoawnl661cmj"           # Colon-separated format: IP:PORT:USER:PASS
# ]
# strategy = "round_robin"  # Options: "round_robin", "random", "sticky_per_hour", "first_available"
# no_proxy = ["localhost", "127.0.0.1", "*.local"]
